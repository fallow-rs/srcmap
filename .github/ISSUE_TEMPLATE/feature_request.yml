name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve and the solution you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like. Include API sketches, code examples, or references if helpful.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package / Crate
      description: Which part of srcmap does this relate to?
      options:
        - codec
        - sourcemap
        - generator
        - remapping
        - scopes
        - symbolicate
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or references that support this request.
    validations:
      required: false
