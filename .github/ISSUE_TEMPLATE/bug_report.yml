name: Bug Report
description: Report a bug in srcmap
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Parse a source map with `...`
        2. Call `original_position_for(...)` with ...
        3. Observe incorrect result
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package / Crate
      description: Which part of srcmap is affected?
      options:
        - codec
        - sourcemap
        - generator
        - remapping
        - scopes
        - symbolicate
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant version and platform information.
      placeholder: |
        - srcmap version:
        - Rust version:
        - Node.js version (if using WASM/NAPI):
        - OS:
        - Browser (if using WASM in browser):
    validations:
      required: false

  - type: textarea
    id: source-map
    attributes:
      label: Source map sample
      description: If possible, include a minimal source map (or link to one) that reproduces the issue.
      render: json
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or logs that might help.
    validations:
      required: false
