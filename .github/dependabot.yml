version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
    groups:
      napi:
        patterns: ["napi", "napi-derive", "napi-build"]
      wasm-bindgen:
        patterns: ["wasm-bindgen", "js-sys"]
    ignore:
      # memchr 2.8.3 regressed the performance gate; retry with the next release.
      - dependency-name: memchr
        versions: ["2.8.3"]
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
    groups:
      napi-toolchain:
        patterns: ["@napi-rs/*"]
      js-tooling:
        patterns: ["oxlint", "oxfmt", "fallow"]
    ignore:
      # Self-published platform binaries; bumped in lockstep by the release
      # process to match the package version, never independently by Dependabot.
      - dependency-name: "@srcmap/*"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
