name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
      - "breaking-change"
  - title: "Features"
    labels:
      - "feat"
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bug"
      - "bugfix"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "Performance"
    labels:
      - "perf"
  - title: "Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "test"
      - "dependencies"
      - "ci"

version-resolver:
  major:
    labels:
      - "breaking"
      - "breaking-change"
  minor:
    labels:
      - "feat"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bug"
      - "bugfix"
      - "chore"
      - "refactor"
      - "docs"
      - "documentation"
      - "perf"
      - "test"
      - "dependencies"
      - "ci"
  default: patch

autolabeler:
  - label: "feat"
    title:
      - "/^feat[:(]/i"
  - label: "fix"
    title:
      - "/^fix[:(]/i"
  - label: "chore"
    title:
      - "/^chore[:(]/i"
  - label: "refactor"
    title:
      - "/^refactor[:(]/i"
  - label: "docs"
    title:
      - "/^docs[:(]/i"
  - label: "perf"
    title:
      - "/^perf[:(]/i"
  - label: "test"
    title:
      - "/^test[:(]/i"

exclude-labels:
  - "skip-changelog"
