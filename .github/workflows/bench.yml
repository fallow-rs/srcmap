name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'benchmarks/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/scripts/generate-benchmark-matrix.mjs'
      - '.github/workflows/bench.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'benchmarks/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/scripts/generate-benchmark-matrix.mjs'
      - '.github/workflows/bench.yml'
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=1 -C strip=none -g --cfg codspeed"

jobs:
  benchmark-matrix:
    name: Generate benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.matrix.outputs.include }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate benchmark matrix
        id: matrix
        run: node .github/scripts/generate-benchmark-matrix.mjs

  benchmark:
    name: CodSpeed (${{ matrix.label }})
    needs: benchmark-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.benchmark-matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.kind == 'node'
        with:
          node-version: 22

      - name: Enable Corepack
        if: matrix.kind == 'node'
        run: corepack enable

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        if: matrix.kind == 'rust'

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        if: matrix.kind == 'node'
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: bench-${{ matrix.cache_key }}

      - name: Install JS dependencies
        if: matrix.kind == 'node'
        run: corepack pnpm install --ignore-scripts --frozen-lockfile

      - name: Install wasm-pack
        if: matrix.kind == 'node'
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: wasm-pack@0.13.1

      - name: Build JS benchmark packages
        if: matrix.kind == 'node'
        run: |
          corepack pnpm run build:test-artifacts:napi
          corepack pnpm --filter @srcmap/sourcemap-wasm build

      - name: Download real-world fixtures
        if: matrix.fixtures
        run: node benchmarks/download-fixtures.mjs

      - name: Install cargo-codspeed
        if: matrix.kind == 'rust'
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build benchmark shard
        if: matrix.kind == 'rust'
        run: cargo codspeed build -p ${{ matrix.package }} --bench ${{ matrix.bench }} --features ${{ matrix.features }}

      - name: Run benchmark shard
        if: matrix.kind == 'rust'
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: ${{ matrix.mode }}
          run: cargo codspeed run -p ${{ matrix.package }} --bench ${{ matrix.bench }}

      - name: Run package benchmark shard
        if: matrix.kind == 'node'
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: ${{ matrix.mode }}
          run: ${{ matrix.command }}
