<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Source Map Viewer — srcmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
  h1 { margin-bottom: 1rem; }
  textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; padding: 0.5rem; }
  button { padding: 0.5rem 1rem; margin: 0.5rem 0; cursor: pointer; }
  #output { margin-top: 1rem; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
  th { background: #f5f5f5; }
  .meta { margin: 1rem 0; padding: 1rem; background: #f9f9f9; border-radius: 4px; }
</style>
</head>
<body>
<h1>Source Map Viewer</h1>
<p>Paste a source map JSON below and click "Parse" to inspect its contents.</p>

<textarea id="input" placeholder='{"version":3,"sources":["input.js"],"names":["hello"],"mappings":"AAAA;AACA,EAAA"}'></textarea>
<br>
<button id="parseBtn">Parse Source Map</button>

<div id="output"></div>

<script type="module">
// This example demonstrates using srcmap via the web WASM target.
// In production, import from '@srcmap/sourcemap-wasm' after building with --target web.
//
// For this demo, we use a pure-JS fallback since we can't assume WASM is built.

document.getElementById('parseBtn').addEventListener('click', function() {
  const input = document.getElementById('input').value.trim()
  const output = document.getElementById('output')

  // Clear previous output safely
  while (output.firstChild) output.removeChild(output.firstChild)

  if (!input) {
    const p = document.createElement('p')
    p.textContent = 'Please paste a source map.'
    output.appendChild(p)
    return
  }

  try {
    const map = JSON.parse(input)

    // Metadata section
    const meta = document.createElement('div')
    meta.className = 'meta'
    const dl = document.createElement('dl')

    const addMeta = (label, value) => {
      const dt = document.createElement('dt')
      dt.textContent = label + ': '
      dt.style.display = 'inline'
      dt.style.fontWeight = 'bold'
      const dd = document.createElement('dd')
      dd.textContent = value
      dd.style.display = 'inline'
      dd.style.marginRight = '1.5rem'
      dl.appendChild(dt)
      dl.appendChild(dd)
    }

    addMeta('Version', map.version)
    if (map.file) addMeta('File', map.file)
    if (map.sourceRoot) addMeta('Source Root', map.sourceRoot)
    addMeta('Sources', (map.sources || []).length)
    addMeta('Names', (map.names || []).length)
    if (map.debugId) addMeta('Debug ID', map.debugId)
    meta.appendChild(dl)
    output.appendChild(meta)

    // Sources list
    const h3s = document.createElement('h3')
    h3s.textContent = 'Sources'
    output.appendChild(h3s)
    const ul = document.createElement('ul')
    for (const src of (map.sources || [])) {
      const li = document.createElement('li')
      li.textContent = src
      ul.appendChild(li)
    }
    output.appendChild(ul)

    // Decode and display mappings
    const mappings = decodeMappings(map.mappings || '')
    const h3m = document.createElement('h3')
    h3m.textContent = `Mappings (${mappings.length} segments)`
    output.appendChild(h3m)

    const table = document.createElement('table')
    const thead = document.createElement('thead')
    const headerRow = document.createElement('tr')
    for (const h of ['Gen Line', 'Gen Col', 'Source', 'Orig Line', 'Orig Col', 'Name']) {
      const th = document.createElement('th')
      th.textContent = h
      headerRow.appendChild(th)
    }
    thead.appendChild(headerRow)
    table.appendChild(thead)

    const tbody = document.createElement('tbody')
    const maxShow = 200
    for (let i = 0; i < Math.min(mappings.length, maxShow); i++) {
      const m = mappings[i]
      const row = document.createElement('tr')
      const addCell = (text) => {
        const td = document.createElement('td')
        td.textContent = text
        row.appendChild(td)
      }
      addCell(m.genLine)
      addCell(m.genCol)
      addCell(m.source >= 0 ? (map.sources[m.source] || '?') : '-')
      addCell(m.source >= 0 ? m.origLine : '-')
      addCell(m.source >= 0 ? m.origCol : '-')
      addCell(m.name >= 0 ? (map.names[m.name] || '?') : '')
      tbody.appendChild(row)
    }
    if (mappings.length > maxShow) {
      const row = document.createElement('tr')
      const td = document.createElement('td')
      td.colSpan = 6
      td.textContent = `... and ${mappings.length - maxShow} more`
      row.appendChild(td)
      tbody.appendChild(row)
    }
    table.appendChild(tbody)
    output.appendChild(table)
  } catch (e) {
    const p = document.createElement('p')
    p.style.color = 'red'
    p.textContent = 'Error: ' + e.message
    output.appendChild(p)
  }
})

// Minimal VLQ decoder for the demo
function decodeMappings(str) {
  const B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
  const decode = {}
  for (let i = 0; i < 64; i++) decode[B64[i]] = i

  const mappings = []
  let genLine = 0, genCol = 0, source = 0, origLine = 0, origCol = 0, name = 0

  for (const line of str.split(';')) {
    genCol = 0
    if (!line) { genLine++; continue }
    for (const seg of line.split(',')) {
      const vals = []
      let shift = 0, value = 0
      for (const c of seg) {
        const d = decode[c]
        if (d === undefined) continue
        value += (d & 0x1f) << shift
        shift += 5
        if ((d & 0x20) === 0) {
          vals.push(value & 1 ? -(value >> 1) : value >> 1)
          shift = 0; value = 0
        }
      }
      if (vals.length >= 1) genCol += vals[0]
      const m = { genLine, genCol, source: -1, origLine: 0, origCol: 0, name: -1 }
      if (vals.length >= 4) {
        source += vals[1]; origLine += vals[2]; origCol += vals[3]
        m.source = source; m.origLine = origLine; m.origCol = origCol
      }
      if (vals.length >= 5) { name += vals[4]; m.name = name }
      mappings.push(m)
    }
    genLine++
  }
  return mappings
}
</script>
</body>
</html>
